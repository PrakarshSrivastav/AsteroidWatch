version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_PORT=8000
      - ALLOWED_ORIGINS=http://localhost:8080,http://127.0.0.1:8080,http://localhost:80
    depends_on:
      - redis
    volumes:
      - .:/app
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: always
